<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Tasks</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
    }

    /* ── 3D Glass Background Scene ── */
    .scene {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      padding: 2.5rem 1rem 4rem;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    /* Floating colour orbs for depth */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(70px);
      pointer-events: none;
    }
    .orb1 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #a855f7, #6366f1);
      top: -120px; left: -120px;
      opacity: .55;
    }
    .orb2 {
      width: 320px; height: 320px;
      background: radial-gradient(circle, #06b6d4, #3b82f6);
      bottom: -80px; right: -80px;
      opacity: .55;
    }
    .orb3 {
      width: 220px; height: 220px;
      background: radial-gradient(circle, #f472b6, #ec4899);
      top: 45%; left: 62%;
      opacity: .32;
    }
    .orb4 {
      width: 160px; height: 160px;
      background: radial-gradient(circle, #34d399, #10b981);
      top: 20%; right: 10%;
      opacity: .28;
    }

    /* ── Glassmorphism Card ── */
    .app { width: 100%; max-width: 520px; position: relative; z-index: 1; }

    .card {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.45),
        0 2px 8px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.22),
        inset 0 -1px 0 rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      padding: 2.25rem 2rem 2rem;
      transform: perspective(1200px) rotateX(1.5deg);
    }

    /* ── Header ── */
    .header { margin-bottom: 1.5rem; }
    .title { font-size: 24px; font-weight: 700; color: #fff; letter-spacing: -0.4px; }
    .subtitle { font-size: 13px; color: rgba(255,255,255,.45); margin-top: 4px; }

    /* ── Input Row ── */
    .input-row { display: flex; gap: 10px; margin-bottom: 1.1rem; }

    .task-input {
      flex: 1;
      height: 46px;
      padding: 0 16px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 14px;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.25);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .task-input::placeholder { color: rgba(255,255,255,.35); }
    .task-input:focus {
      border-color: rgba(168, 139, 250, 0.7);
      box-shadow: 0 0 0 3px rgba(168,139,250,.22), inset 0 2px 4px rgba(0,0,0,0.25);
    }

    .btn-add {
      height: 46px;
      padding: 0 20px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #a855f7 0%, #6366f1 100%);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(99,102,241,.5), inset 0 1px 0 rgba(255,255,255,.25);
      transition: transform 0.1s, box-shadow 0.15s;
    }
    .btn-add:hover { box-shadow: 0 6px 22px rgba(99,102,241,.65), inset 0 1px 0 rgba(255,255,255,.25); }
    .btn-add:active { transform: scale(0.97); }

    /* ── Stats Row ── */
    .stats-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.6rem;
    }
    .counter { font-size: 12px; color: rgba(255,255,255,.5); }
    .counter strong { color: rgba(255,255,255,.9); }

    .btn-clear {
      font-size: 12px;
      color: rgba(255,255,255,.38);
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.15s;
    }
    .btn-clear:hover { color: #f87171; }

    /* ── Progress Bar ── */
    .progress-wrap {
      height: 4px;
      background: rgba(255,255,255,.1);
      border-radius: 99px;
      margin-bottom: 1.25rem;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #a855f7, #06b6d4);
      transition: width 0.35s ease;
      width: 0%;
    }

    /* ── Task List ── */
    .task-list { list-style: none; display: flex; flex-direction: column; gap: 8px; min-height: 50px; }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 15px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 16px;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
      transition: border-color 0.15s, opacity 0.25s, background 0.15s, box-shadow 0.15s;
      animation: slideIn 0.22s ease;
    }
    .task-item:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(168,139,250,.4);
      box-shadow: 0 4px 16px rgba(0,0,0,.2), inset 0 1px 0 rgba(255,255,255,.12);
    }
    .task-item.done { opacity: 0.42; }
    .task-item.done:hover { opacity: 0.6; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes fadeOut {
      to { opacity: 0; transform: scale(0.94); }
    }

    /* ── Checkbox ── */
    .checkbox {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.28);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.18s, border-color 0.18s, box-shadow 0.18s;
    }
    .task-item.done .checkbox {
      background: linear-gradient(135deg, #34d399, #10b981);
      border-color: transparent;
      box-shadow: 0 0 10px rgba(52,211,153,.45);
    }
    .checkmark { display: none; }
    .task-item.done .checkmark { display: block; }

    /* ── Task Text ── */
    .task-text {
      flex: 1;
      font-size: 14px;
      color: rgba(255,255,255,.88);
      line-height: 1.45;
      word-break: break-word;
    }
    .task-item.done .task-text {
      text-decoration: line-through;
      color: rgba(255,255,255,.3);
    }

    /* ── Delete Button ── */
    .btn-del {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.38);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.15s, background 0.12s, color 0.12s;
      flex-shrink: 0;
      font-family: inherit;
    }
    .task-item:hover .btn-del { opacity: 1; }
    .btn-del:hover { background: rgba(248,113,113,.2); color: #f87171; }

    /* ── Empty State ── */
    .empty {
      text-align: center;
      padding: 2.5rem 0;
      color: rgba(255,255,255,.28);
      font-size: 14px;
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 11px;
      color: rgba(255,255,255,.22);
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .card { padding: 1.5rem 1.25rem 1.5rem; }
      .btn-add { padding: 0 14px; font-size: 13px; }
    }
  </style>
</head>
<body>

<div class="scene">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="orb orb4"></div>

  <div class="app">
    <div class="card">

      <div class="header">
        <p class="title">My Tasks</p>
        <p class="subtitle" id="dateLabel"></p>
      </div>

      <div class="input-row">
        <input
          class="task-input"
          id="taskInput"
          type="text"
          placeholder="Add a new task..."
          maxlength="140"
          autocomplete="off"
        />
        <button class="btn-add" id="addBtn">+ Add</button>
      </div>

      <div class="stats-row">
        <p class="counter" id="counter"><strong>0</strong> tasks &bull; <strong>0</strong> done</p>
        <button class="btn-clear" id="clearBtn">Clear all</button>
      </div>

      <div class="progress-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <ul class="task-list" id="taskList"></ul>

      <p class="footer">Tasks are saved automatically in your browser.</p>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'glass_tasks_v1';
  let tasks = [];

  function loadTasks() {
    try { tasks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch(e) { tasks = []; }
  }

  function saveTasks() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  }

  function uid() {
    return Math.random().toString(36).slice(2) + Date.now().toString(36);
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function render() {
    const list     = document.getElementById('taskList');
    const counter  = document.getElementById('counter');
    const bar      = document.getElementById('progressBar');
    const total    = tasks.length;
    const done     = tasks.filter(t => t.done).length;
    const pct      = total > 0 ? Math.round((done / total) * 100) : 0;

    counter.innerHTML =
      `<strong>${total}</strong> task${total !== 1 ? 's' : ''} &bull; <strong>${done}</strong> done`;
    bar.style.width = pct + '%';
    list.innerHTML = '';

    if (total === 0) {
      list.innerHTML = '<li class="empty">No tasks yet. Add one above!</li>';
      return;
    }

    tasks.forEach(task => {
      const li = document.createElement('li');
      li.className = 'task-item' + (task.done ? ' done' : '');
      li.dataset.id = task.id;
      li.innerHTML = `
        <div class="checkbox">
          <svg class="checkmark" width="10" height="10" viewBox="0 0 10 10" fill="none">
            <polyline points="1.5,5 4,7.5 8.5,2"
              stroke="white" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="task-text">${escapeHtml(task.text)}</span>
        <button class="btn-del" data-del="${task.id}" title="Delete">&#215;</button>
      `;

      li.addEventListener('click', e => {
        if (e.target.closest('[data-del]')) return;
        toggleTask(task.id);
      });

      li.querySelector('[data-del]').addEventListener('click', e => {
        e.stopPropagation();
        deleteTask(task.id, li);
      });

      list.appendChild(li);
    });
  }

  function addTask(text) {
    text = text.trim();
    if (!text) return false;
    tasks.unshift({ id: uid(), text, done: false, created: Date.now() });
    saveTasks(); render();
    return true;
  }

  function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; saveTasks(); render(); }
  }

  function deleteTask(id, el) {
    el.style.animation = 'fadeOut 0.18s ease forwards';
    setTimeout(() => {
      tasks = tasks.filter(t => t.id !== id);
      saveTasks(); render();
    }, 170);
  }

  document.getElementById('addBtn').addEventListener('click', () => {
    const inp = document.getElementById('taskInput');
    if (addTask(inp.value)) inp.value = '';
    inp.focus();
  });

  document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (addTask(e.target.value)) e.target.value = '';
    }
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    if (tasks.length === 0) return;
    if (confirm('Clear all tasks?')) { tasks = []; saveTasks(); render(); }
  });

  (function setDate() {
    const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const now    = new Date();
    document.getElementById('dateLabel').textContent =
      days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate();
  })();

  loadTasks();
  render();
</script>
</body>
</html>
